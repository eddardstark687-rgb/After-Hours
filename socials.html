<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFTER HOURS — Socials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #f0f0f5;
      --white-dim: rgba(240, 240, 245, 0.45);
      --accent: #60a5fa;
    }

    body {
      background: #050510;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, #0c1030 0%, #08081a 40%, #050510 70%, #020208 100%);
    }

    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 40% at 50% 50%, rgba(40, 80, 160, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(20px, 3vh, 40px) clamp(32px, 4vw, 80px);
      background: linear-gradient(180deg, rgba(5, 5, 16, 0.95) 0%, rgba(5, 5, 16, 0) 100%);
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(13px, 1.3vw, 18px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff, #a0b0d0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: clamp(24px, 3vw, 56px);
    }

    .nav-link {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(14px, 1.2vw, 18px);
      color: var(--white-dim);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.4s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--white);
    }

    .socials-main {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vh, 40px);
    }

    .socials-heading {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(32px, 5vw, 72px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 0%, #a0b0d0 60%, #607090 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .socials-sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(16px, 1.8vw, 26px);
      color: var(--white-dim);
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .socials-icons {
      display: flex;
      gap: clamp(32px, 5vw, 72px);
      margin-top: clamp(16px, 2vh, 32px);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 1.5vh, 18px);
      text-decoration: none;
      color: var(--white-dim);
      transition: color 0.4s ease, transform 0.4s ease;
    }

    .social-link:hover {
      color: var(--white);
      transform: translateY(-6px);
    }

    .social-icon {
      width: clamp(56px, 7vw, 88px);
      height: clamp(56px, 7vw, 88px);
      border-radius: 50%;
      border: 2px solid rgba(160, 176, 208, 0.3);
      background: rgba(10, 15, 30, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
    }

    .social-link:hover .social-icon {
      border-color: var(--accent);
      background: rgba(20, 40, 80, 0.6);
      box-shadow: 0 0 30px rgba(96, 165, 250, 0.15);
    }

    .social-icon svg {
      width: clamp(26px, 3.5vw, 40px);
      height: clamp(26px, 3.5vw, 40px);
      fill: currentColor;
      transition: fill 0.4s ease;
    }

    .social-link:hover .social-icon svg {
      fill: var(--white);
    }

    .social-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(13px, 1.2vw, 17px);
      letter-spacing: 0.05em;
      transition: color 0.4s ease;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .nav {
        padding: 24px 20px;
      }
      .nav-logo {
        font-size: 14px;
        letter-spacing: 0.2em;
      }
      .nav-links {
        gap: 18px;
      }
      .nav-link {
        font-size: 16px;
      }
      .socials-heading {
        font-size: clamp(32px, 10vw, 56px);
      }
      .socials-sub {
        font-size: clamp(18px, 6vw, 26px);
      }
      .socials-icons {
        gap: 32px;
      }
      .social-icon {
        width: clamp(64px, 18vw, 90px);
        height: clamp(64px, 18vw, 90px);
      }
      .social-icon svg {
        width: clamp(30px, 9vw, 42px);
        height: clamp(30px, 9vw, 42px);
      }
      .social-label {
        font-size: clamp(15px, 4vw, 20px);
      }
    }

    @media (max-width: 480px) {
      .nav {
        padding: 20px 16px;
      }
      .nav-logo {
        font-size: 13px;
        letter-spacing: 0.15em;
      }
      .nav-links {
        gap: 14px;
      }
      .nav-link {
        font-size: 17px;
      }
      .socials-heading {
        font-size: clamp(36px, 12vw, 64px);
      }
      .socials-sub {
        font-size: clamp(20px, 7vw, 28px);
      }
      .socials-icons {
        gap: 28px;
      }
      .social-icon {
        width: clamp(72px, 20vw, 100px);
        height: clamp(72px, 20vw, 100px);
      }
      .social-icon svg {
        width: clamp(34px, 10vw, 48px);
        height: clamp(34px, 10vw, 48px);
      }
      .social-label {
        font-size: clamp(17px, 5vw, 22px);
      }
    }
  </style>
</head>
<body>
  <div id="bg"></div>

  <nav class="nav">
    <a href="./index.html" class="nav-logo">AFTER HOURS</a>
    <div class="nav-links">
      <a href="./index.html" class="nav-link">Home</a>
      <a href="./gallery.html" class="nav-link">Gallery</a>
      <a href="./socials.html" class="nav-link active">Socials</a>
    </div>
  </nav>

  </main>
</body>
</html>
